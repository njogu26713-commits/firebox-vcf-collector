kind = "web"
previewPath = "/"
title = "Firebox VCF Creator Dashboard"
version = "1.0.0"
id = "artifacts/firebox-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24816

[services.development]
run = "pnpm --filter @workspace/firebox-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/firebox-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/firebox-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24816"
BASE_PATH = "/"
